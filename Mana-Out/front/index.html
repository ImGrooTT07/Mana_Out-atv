<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mana Out</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">

    <nav class="navbar">

      <h1 class="logo">Mana Out</h1>

      <div class="nav-actions">

        <span id="usuario-logado"></span>

        <button id="logout-btn" class="btn-nav">
          Sair
        </button>

      </div>

    </nav>


    <div class="hero-content">

      <div>

        <h2>
          Sua biblioteca gamer
          em um só lugar.
        </h2>

        <p>
          Organize seus jogos favoritos e monte
          sua coleção definitiva.
        </p>

        <button class="hero-button">
          Explorar jogos
        </button>

      </div>


      <div class="hero-card">

        <img
          src="https://images.igdb.com/igdb/image/upload/t_cover_big/co1wyy.jpg"
          alt="The Witcher 3"
        >

        <div class="hero-card-info">

          <h3>The Witcher 3</h3>

          <span>RPG • PC</span>

        </div>

      </div>

    </div>

  </header>



  <main class="container">

    <section class="container-form">

      <div class="section-title">

        <h2>Cadastrar Jogo</h2>

        <p>
          Adicione um novo jogo na coleção
        </p>

      </div>


      <form id="form-jogo">

        <input
          type="text"
          id="nome"
          placeholder="Nome do jogo"
          required
        >

        <input
          type="text"
          id="plataforma"
          placeholder="Plataforma"
        >

        <input
          type="number"
          id="ano"
          placeholder="Ano"
        >

        <input
          type="text"
          id="imagem"
          placeholder="URL da imagem"
        >

        <textarea
          id="descricao"
          placeholder="Descrição"
        ></textarea>

        <select id="categoria">

          <option value="">
            Selecione uma categoria
          </option>

        </select>

        <button type="submit">
          Salvar jogo
        </button>

      </form>

    </section>



    <section>

      <div class="section-title">

        <h2>Biblioteca</h2>

        <p>
          Jogos cadastrados no sistema
        </p>

      </div>

      <div
        id="lista-jogos"
        class="lista-jogos"
      ></div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
